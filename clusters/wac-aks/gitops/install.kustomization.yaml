apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
 name: wacdemo-install  # v spoločnom klastri je nasadených viacero takýchto objektov
 namespace: wac-hospital
spec:
 wait: true
 dependsOn:
 - name:  prepare
 interval: 42s
 path: clusters/wac-aks/install
 prune: true
 sourceRef:
     kind: GitRepository
     name: wacdemo-gitops-repo